name: Build XNB Exporter Pro

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Ручной запуск

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Restore NuGet packages
      run: dotnet restore src/XNBExporterPro.csproj

    - name: Build Release (Framework-dependent)
      run: dotnet build src/XNBExporterPro.csproj -c Release

    - name: Publish Self-Contained (single EXE)
      run: |
        dotnet publish src/XNBExporterPro.csproj -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true /p:IncludeNativeLibrariesForSelfExtract=true -o publish

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: XNBExporterPro-win-x64
        path: publish/XNBExporterPro.exe
        retention-days: 90

    - name: Create Release (on tag push)
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: publish/XNBExporterPro.exe
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
